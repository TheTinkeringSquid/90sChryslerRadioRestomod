; PlatformIO project — Dodge B2500 Radio Restomod
; ESP32 with Bluetooth Classic (A2DP + HFP). Do NOT switch to ESP32-S3 (BLE-only).
;
; This is a SKELETON. Library deps below are commented placeholders — uncomment
; and pin versions once the corresponding module is actually implemented.

[platformio]
default_envs = esp32dev
src_dir = src

[env:esp32dev]
platform = espressif32
board = esp32dev            ; ESP32-WROOM-32. Swap to a WROVER board id if PSRAM needed.
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D CORE_DEBUG_LEVEL=3
    ; -D ENABLE_HFP=0        ; gate hands-free until HW/codec proven (phase it)

lib_deps =
    ; --- uncomment as modules are implemented ---
    ; pu2clr/PU2CLR SI4735        ; Si4735 AM/FM tuner driver
    ; pschatzmann/ESP32-A2DP      ; Bluetooth Classic A2DP (+ optional HFP fork)
    ; adafruit/RTClib             ; DS3231 RTC fallback
    ; (codec WM8960/ES8388 driver TBD by chosen part)

; Future: [env:esp32dev-debug] with -D options / JTAG, and a native test env.
